<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferran Torres 2027 | Trình theo dõi hợp đồng</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --barca-blue: #004d98;
            --barca-red: #a50044;
            --neon-green: #00ff88;
            --card-bg: #111520; /* Nền khối đậm màu, nổi bật */
            --card-border: #2a3040; /* Viền khối rõ ràng */
            --text-muted: #8c9baf;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050608;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 15px;
        }

        .background-img {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/4/4b/Ferran_Torres_2023_%28cropped%29.jpg') center top/cover no-repeat;
            opacity: 0.12; 
            z-index: -1;
            filter: grayscale(90%) contrast(150%);
        }

        /* --- PHẦN TIÊU ĐỀ --- */
        h1 {
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--barca-blue) 0%, #d8005a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 4px 30px rgba(165, 0, 68, 0.4);
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-weight: 600;
        }

        /* --- NÚT ĐỔI LƯƠNG --- */
        .toggle-container {
            background: #0a0d14;
            padding: 6px;
            border-radius: 30px;
            display: inline-flex;
            margin-bottom: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-muted); padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: clamp(0.85rem, 2.5vw, 1rem);
        }
        .toggle-btn.active { background: var(--barca-red); color: #fff; box-shadow: 0 0 20px rgba(165, 0, 68, 0.6); }

        /* --- KHỐI TỔNG LƯƠNG CHÍNH --- */
        .main-salary-card {
            background: linear-gradient(145deg, #161b2a, #0d101a);
            border: 1px solid var(--card-border);
            border-top: 4px solid var(--barca-blue);
            border-bottom: 4px solid var(--barca-red);
            border-radius: 24px;
            padding: clamp(25px, 6vw, 40px);
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .salary-title { color: #a4b4cb; font-size: clamp(1rem, 3vw, 1.3rem); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 600; }
        
        /* CHỐNG NHÁY CHỮ TUYỆT ĐỐI */
        .number-font {
            font-family: 'Teko', sans-serif;
            font-feature-settings: "tnum" 1, "kern" 0; /* Ép chế độ Tabular */
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .salary-val { font-size: clamp(3.5rem, 10vw, 7rem); color: var(--neon-green); line-height: 1; text-shadow: 0 0 40px rgba(0, 255, 136, 0.3); display: flex; justify-content: center; align-items: baseline; gap: 5px;}
        .salary-vnd { font-size: clamp(2rem, 6vw, 3rem); color: #ffcc00; margin-top: 15px; opacity: 0.95; display: flex; justify-content: center; align-items: baseline; gap: 10px;}

        .currency-symbol { font-size: 0.7em; opacity: 0.8; font-family: 'Inter', sans-serif; font-weight: bold;}

        /* --- KHỐI ĐẾM NGƯỢC THỜI GIAN --- */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
        }

        .time-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .time-val { font-size: clamp(2.5rem, 6vw, 4rem); line-height: 1; color: #fff; }
        .time-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-top: 5px; font-weight: 600; }
